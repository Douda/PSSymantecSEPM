name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.0.x'

      - name: Run GitVersion (diagnostics)
        shell: bash
        run: |
          echo "=== Git config (showconfig) ==="
          dotnet-gitversion /showconfig || true
          echo "=== Git log (last 5 commits) ==="
          git log --oneline -5
          echo "=== Git tags ==="
          git tag -l
          echo "=== GitVersion diagnostics ==="
          dotnet-gitversion /diag 2>&1 || true
          echo "=== GitVersion JSON ==="
          dotnet-gitversion /output json 2>&1 || true

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Build Module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name ModuleBuilder, Configuration -Force -Scope CurrentUser -ErrorAction Stop
          Build-Module -SourcePath ./Source/PSSymantecSEPM.psd1 -SemVer ${{ steps.gitversion.outputs.SemVer }}

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

  test-ps7:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Run Pester tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ImportExcel -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module ./Output/PSSymantecSEPM/PSSymantecSEPM.psm1 -Force
          Invoke-Pester -Path ./Tests/ -CI

  test-ps51:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Run Pester tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ImportExcel -Force -Scope CurrentUser -ErrorAction Stop
          function global:Get-Credential { throw "Get-Credential invoked in CI - this should not happen" }
          Import-Module ./Output/PSSymantecSEPM/PSSymantecSEPM.psm1 -Force
          Invoke-Pester -Path ./Tests/ -CI

  publish:
    needs: [test-ps7, test-ps51]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Publish-Module -Path ./Output/PSSymantecSEPM/ -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Force
