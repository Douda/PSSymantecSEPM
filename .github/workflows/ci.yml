name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.0.x'

      - name: Run GitVersion
        id: gitversion
        shell: bash
        run: |
          set +e
          GV_OUTPUT=$(dotnet-gitversion /output json 2>&1)
          GITV_EXIT=$?
          set -e
          echo "GitVersion exit code: $GITV_EXIT"
          echo "=== Full GitVersion output ==="
          echo "$GV_OUTPUT"
          echo "=== End GitVersion output ==="
          # GitVersion 6.x emits INFO lines to stdout alongside JSON.
          # Extract SemVer from the JSON object in the output.
          SEMVER=$(echo "$GV_OUTPUT" | grep -oP '"SemVer"\s*:\s*"\K[^"]+' || true)
          echo "Extracted SemVer: '$SEMVER'"
          if [ -z "$SEMVER" ] || [ "$GITV_EXIT" != "0" ]; then
            echo "GitVersion failed or empty SemVer, computing fallback from latest tag"
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag: $LATEST_TAG"
            # Parse MAJOR.MINOR.PATCH from tag, bump minor, reset patch to 0
            SEMVER=$(echo "$LATEST_TAG" | sed -E 's/^v?([0-9]+)\.([0-9]+)\.([0-9]+).*/\1.\2.\3/' | awk -F. '{print $1"."($2+1)".0"}')
            echo "Computed SemVer: $SEMVER"
            if [ -z "$SEMVER" ]; then
              SEMVER="0.12.3"
              echo "Fallback to hardcoded: $SEMVER"
            fi
          fi
          echo "SemVer=$SEMVER" >> $GITHUB_OUTPUT

      - name: Build Module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name ModuleBuilder, Configuration -Force -Scope CurrentUser -ErrorAction Stop
          Build-Module -SourcePath ./Source/PSSymantecSEPM.psd1 -SemVer ${{ steps.gitversion.outputs.SemVer }}

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

  test-ps7:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Run Pester tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ImportExcel -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ModuleBuilder, Configuration -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module ./Output/PSSymantecSEPM/PSSymantecSEPM.psm1 -Force
          Invoke-Pester -Path ./Tests/ -ExcludePath '*Template*' -CI

  test-ps51:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Run Pester tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ImportExcel -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module -Name ModuleBuilder, Configuration -Force -Scope CurrentUser -ErrorAction Stop
          function global:Get-Credential { throw "Get-Credential invoked in CI - this should not happen" }
          Import-Module ./Output/PSSymantecSEPM/PSSymantecSEPM.psm1 -Force
          Invoke-Pester -Path ./Tests/ -ExcludePath '*Template*' -CI

  publish:
    needs: [test-ps7, test-ps51]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: module
          path: ./Output/PSSymantecSEPM/

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          Install-Module -Name ImportExcel -Force -Scope CurrentUser -ErrorAction Stop
          Publish-Module -Path ./Output/PSSymantecSEPM/ -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Force
