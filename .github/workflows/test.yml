name: Pester Tests

on:
  push:
    branches:
      - 5-auth-session-module
      - linux-dev-rewrite
  pull_request:
    branches:
      - linux-dev-rewrite

jobs:
  test-ps7:
    name: PS 7+ (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ModuleBuilder -Force -Scope CurrentUser
          Install-Module -Name Configuration -Force -Scope CurrentUser
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser

      - name: Build module
        shell: pwsh
        run: |
          Import-Module ModuleBuilder -Force
          Build-Module -SourcePath ./Source/PSSymantecSEPM.psd1 -SemVer 0.0.1

      - name: Run tests
        timeout-minutes: 5
        shell: pwsh
        run: |
          Import-Module Pester -Force
          $result = Invoke-Pester ./Tests/ -PassThru
          Write-Host "Passed: $($result.PassedCount) | Failed: $($result.FailedCount) | Skipped: $($result.SkippedCount)"
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) test(s) failed" }

  test-ps51:
    name: PS 5.1 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ModuleBuilder -Force -Scope CurrentUser
          Install-Module -Name Configuration -Force -Scope CurrentUser
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser

      - name: Build module
        shell: pwsh
        run: |
          Import-Module ModuleBuilder -Force
          Build-Module -SourcePath ./Source/PSSymantecSEPM.psd1 -SemVer 0.0.1

      - name: Run tests
        timeout-minutes: 10
        shell: powershell
        run: |
          # Override Get-Credential to prevent hangs in non-interactive CI
          function global:Get-Credential { throw 'Get-Credential called in headless CI - test should mock this' }
          Import-Module Pester -Force
          $result = Invoke-Pester ./Tests/ -PassThru
          Write-Host "Passed: $($result.PassedCount) | Failed: $($result.FailedCount) | Skipped: $($result.SkippedCount)"
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) test(s) failed" }
